bioSection:
  title: "Qualität schaffen, Excellence liefern, im Glaube leben."
  imageAltText: "Ein Mann steht auf einem Balkon mit einem Glasrailing, der einen breiten Canyon mit dichten grünen Bäumen überblickt. Der Himmel ist klar und die Beleuchtung ist hell und natürlich."
